# Archfrican · Walker launcher (⌘+Space via archfrican-spotlight). Backend: the elephant daemon.
# The look lives in ~/.config/walker/themes/archfrican/style.css — GENERATED by theme-switch from the ADL
# tokens (layouts fall back to Walker's bundled default, so only the stylesheet is ours). Do NOT hand-edit
# the generated stylesheet; edit templates/walker.css in the repo instead.
theme = "archfrican"
force_keyboard_focus = true         # keep typing in Walker even under niri focus-follows-mouse
close_when_open = true              # ⌘+Space again closes it
click_to_close = true               # click outside the box closes it
selection_wrap = false
# niri implements ext-background-effect-v1, so Walker frosts JUST behind its own box (clipped) — the
# clean way to blur a launcher without the whole-layer flatten that a niri layer-rule would cause.
ext_background_effect_blur = true

[shell]
layer = "overlay"
anchor_top = true
anchor_bottom = true
anchor_left = true
anchor_right = true

[providers]
default = ["desktopapplications", "calc", "websearch"]   # queried as you type
empty = ["desktopapplications"]                          # shown before you type

# Type-a-prefix to jump into a mode (mirrors the old fuzzel modes, now first-class):
[[providers.prefixes]]
prefix = "="            # calculator (qalc-grade)
provider = "calc"
[[providers.prefixes]]
prefix = "/"            # file browser / search
provider = "files"
[[providers.prefixes]]
prefix = "@"            # web search (engines in ~/.config/elephant/websearch.toml)
provider = "websearch"
[[providers.prefixes]]
prefix = ":"            # clipboard history
provider = "clipboard"
[[providers.prefixes]]
prefix = "$"            # open windows (focus)
provider = "windows"
[[providers.prefixes]]
prefix = "."            # symbols / emoji
provider = "symbols"
[[providers.prefixes]]
prefix = ";"            # provider switcher
provider = "providerlist"
