# niri is launched by SDDM/niri-session, not a login shell, so ~/.zshrc's PATH additions never
# apply to it or anything it spawns (waybar, swaync, walker, niri keybinds, …). niri's own binds
# sidestep this with absolute paths, but anything invoked by bare name (e.g. swaync's buttons-grid
# commands) silently fails to resolve. Picked up by the systemd --user instance at session start —
# takes effect on the next login/reboot, not retroactively on an already-running session.
PATH=$HOME/.local/bin:$PATH
