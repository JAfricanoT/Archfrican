# ssh-agent.socket (enabled by modules/60-security.sh) listens at this well-known path. Exporting
# it here — not in .zshrc — means every process the systemd --user session spawns (GUI git
# clients, VS Code, terminal shells) can find the agent, not just zsh; a shell-rc-only export
# would leave GUI apps unable to use your loaded key at all. Picked up by the systemd --user
# instance at session start — takes effect on the next login/reboot, not retroactively on an
# already-running session (same caveat as PATH's 10-path.conf in this same directory).
SSH_AUTH_SOCK=$XDG_RUNTIME_DIR/ssh-agent.socket
