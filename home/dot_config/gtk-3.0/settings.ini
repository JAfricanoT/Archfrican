# Archfrican · GTK3 baseline (macOS look). Applied on app start without a session
# bus; theme-switch/gsettings override it live in a running session.
[Settings]
gtk-theme-name=WhiteSur-Dark
gtk-icon-theme-name=WhiteSur-dark
gtk-cursor-theme-name=McMojave-cursors
gtk-font-name=SF Pro Display 11
gtk-application-prefer-dark-theme=1
