# Archfrican · fuzzel as the Spotlight surface (⌘+Space → archfrican-spotlight). Colors in ./colors.ini.
# Inter for text + JetBrainsMono Nerd Font as fallback so the mode glyphs render.
[main]
font=Inter:size=14,JetBrainsMono Nerd Font:size=13
prompt="   "
icon-theme=WhiteSur-dark
icons-enabled=yes
width=46
lines=12
horizontal-pad=28
vertical-pad=22
inner-pad=16
line-height=28
include=~/.config/fuzzel/colors.ini

[border]
width=1
radius=18

[dmenu]
exit-immediately-if-empty=yes
