# Archfrican · fuzzel as a Spotlight-style launcher. Colors in ./colors.ini.
[main]
font=SF Pro Display:size=14
prompt="  "
icon-theme=WhiteSur-dark
icons-enabled=yes
width=40
lines=8
horizontal-pad=24
vertical-pad=18
inner-pad=12
line-height=26
include=~/.config/fuzzel/colors.ini

[border]
width=1
radius=14

[dmenu]
exit-immediately-if-empty=yes
