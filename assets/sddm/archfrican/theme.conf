[General]
# Default palette (archfrican-dark) + UX knobs. modules/40-theming.sh + bin/theme-switch re-render the
# palette from the active theme's themes/<name>/colors.sh via templates/sddm.theme.conf, so the login
# tracks the desktop theme. Main.qml also carries hard fallbacks, so a missing key never breaks the login.
bgTop=#2c2c2e
bgBottom=#1c1c1e
fieldBg=#3a3a3c
accentColor=#0a84ff
textColor=#f5f5f7
dimColor=#8e8e93
tint2=#bf5af2
tint3=#64d2ff
fontFamily=Inter

# --- UX knobs (edit to taste) ---
backgroundMode=motion
backgroundImage=
backgroundVideo=
virtualKeyboardEnabled=false
animationsEnabled=true
