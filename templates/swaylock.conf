ring-ver-color=${ACCENT}
ring-wrong-color=${RED}
key-hl-color=${ACCENT}
bs-hl-color=${RED}
line-color=00000000
separator-color=00000000
line-uses-ring
text-color=${FG}
text-clear-color=${FG}
