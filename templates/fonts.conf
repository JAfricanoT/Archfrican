<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- Archfrican — map the generic families to the ADL type stack so even apps that read neither GTK
     nor Qt settings inherit the identity. Every <prefer> ends in an official-repo fallback (Inter /
     JetBrainsMono / Noto) so a missing AUR font (e.g. SF on the macOS themes) still degrades to a
     cohesive stack instead of bare DejaVu. Generated by theme-switch — do not edit by hand. -->
<fontconfig>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>${FONT_UI}</family>
      <family>Inter</family>
      <family>Noto Sans</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>${FONT_MONO}</family>
      <family>JetBrainsMono Nerd Font</family>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
    </prefer>
  </alias>
</fontconfig>
