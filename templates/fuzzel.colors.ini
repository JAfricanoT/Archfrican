# generated by theme-switch — included from fuzzel.ini. fuzzel gives an included file its OWN section
# scope, so the colour keys MUST sit under [colors] here; without it fuzzel ignores them and falls back
# to its default cream background (fdf6e3ff).
[colors]
background=${BG}${ALPHA_GLASS_HEX}
text=${FG}ff
match=${ACCENT}ff
selection=${BG_DIM}ff
selection-text=${FG}ff
border=${ACCENT}ff
