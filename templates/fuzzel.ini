# Archfrican · fuzzel = the Spotlight surface (⌘+Space → archfrican-spotlight). Generated by theme-switch
# from the ADL tokens (do NOT edit by hand — colours in ./colors.ini, shape/spacing from tokens.defaults.sh).
# Frosted: the fill in colors.ini is translucent and niri's layer-blur sits behind the launcher.
[main]
font=${FONT_UI}:size=14,${FONT_MONO}:size=13
prompt="   "
icon-theme=${ICON_THEME}
icons-enabled=yes
width=46
lines=12
horizontal-pad=${SPACE_2XL}
vertical-pad=${SPACE_XL}
inner-pad=${SPACE_XL}
line-height=28
include=~/.config/fuzzel/colors.ini

[border]
width=${BORDER_WIDTH}
radius=${RADIUS_LG}

[dmenu]
exit-immediately-if-empty=yes
