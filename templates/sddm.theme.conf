[General]
# generated by theme-switch / 40-theming from themes/<name>/colors.sh — the SDDM login palette.
# Installed to /usr/share/sddm/themes/archfrican/theme.conf so the graphical login matches the
# desktop theme. Main.qml reads these as `config.*` (each with a hard fallback).
bgTop=${BG_ALT}
bgBottom=${BG}
fieldBg=${BG_DIM}
accentColor=${ACCENT}
textColor=${FG}
dimColor=${FG_DIM}
tint2=${MAGENTA}
tint3=${CYAN}
fontFamily=SF Pro Display

# --- UX knobs (literals, not from the palette — edit to taste) ---
# backgroundMode: motion (animated aurora, default) | image | video
backgroundMode=motion
# backgroundImage: absolute path to a wallpaper for `image` mode (empty = rich gradient)
backgroundImage=
# backgroundVideo: absolute path to an .mp4 for `video` mode (needs qt6-multimedia)
backgroundVideo=
# virtualKeyboardEnabled: on-screen keyboard for touchscreens (needs qt6-virtualkeyboard). Default off
# so a desktop login stays clean (it auto-raises on field focus). Flip to true + re-converge for touch.
virtualKeyboardEnabled=false
# animationsEnabled: fade-in + motion (set false for the calmest, lightest login)
animationsEnabled=true
