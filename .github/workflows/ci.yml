name: ci

# The reliability net the audit recommended: lint, a theme-switch idempotency
# smoke test, and a package-resolution check — the three things `bash -n` can't
# catch. Assumes the repo root holds the Archfrican tree (bin/, lib/, modules/,
# packages/, themes/, templates/, home/).
on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck all shell scripts
        run: |
          shellcheck -x -e SC1091 \
            install.sh lib/*.sh modules/*.sh bin/* home/dot_local/bin/executable_* tests/e2e/*.sh \
            migrations/*.sh templates/firstboot-notice.sh build-iso.sh

  bashn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n (syntax)
        run: |
          for f in install.sh lib/*.sh modules/*.sh bin/* home/dot_local/bin/executable_* \
                   themes/tokens.defaults.sh themes/*/colors.sh themes/*/tokens.sh \
                   tests/e2e/*.sh migrations/*.sh build-iso.sh; do bash -n "$f"; done

  firewall-ruleset:
    runs-on: ubuntu-latest        # the firewall must never `flush ruleset` (kills Docker)
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y nftables
      - name: extract + validate the embedded nftables ruleset
        run: |
          set -euo pipefail
          mkdir -p /tmp/nftd; : > /tmp/nftd/archfrican-allows.nft
          awk "/<<'NFT'/{f=1;next} /^NFT\$/{f=0} f" modules/60-security.sh \
            | sed 's#/etc/nftables.d/archfrican-allows.nft#/tmp/nftd/archfrican-allows.nft#' > /tmp/archfrican.nft
          # strip comments first so a comment that merely mentions the phrase can't false-trip this
          grep -vE '^[[:space:]]*#' /tmp/archfrican.nft | grep -q 'flush ruleset' \
            && { echo "::error::firewall uses 'flush ruleset' — it would wipe Docker/podman tables on reload"; exit 1; } || true
          grep -q 'table inet filter' /tmp/archfrican.nft \
            || { echo "::error::firewall has no named 'table inet filter'"; exit 1; }
          # nft -c is best-effort here (check mode vs the create/delete/recreate idiom); the
          # grep gates above are the hard guarantees.
          sudo nft -c -f /tmp/archfrican.nft && echo "nft -c: ruleset valid" || echo "note: nft -c reported (create/delete/recreate is applied live by nft -f)"
          echo "firewall: named table, no flush ruleset"

  iso-safety-gate:
    runs-on: ubuntu-latest        # the disk-wipe path must ship DISABLED
    steps:
      - uses: actions/checkout@v4
      - name: ISO full-install defaults to dry-run (ARCHFRICAN_ISO_ARMED safe-default 0)
        run: |
          set -euo pipefail
          grep -qE '^ARCHFRICAN_ISO_ARMED="\$\{ARCHFRICAN_ISO_ARMED:-0\}"$' lib/base-install.sh \
            || { echo "::error::lib/base-install.sh must DEFAULT ARCHFRICAN_ISO_ARMED to 0 (env-overridable; never hardcode =1) — docs/STAGE2-VALIDATION.md"; exit 1; }
          echo "iso-safety: installer defaults to dry-run (real install is a runtime opt-in)"

  deepclean-safety-gate:
    runs-on: ubuntu-latest        # the wipe of deep-clean must ship DISABLED and never reformat
    steps:
      - uses: actions/checkout@v4
      - name: deep-clean defaults to dry-run + never reformats (subvolume-only)
        run: |
          set -euo pipefail
          grep -qE '^ARCHFRICAN_DEEPCLEAN_ARMED="\$\{ARCHFRICAN_DEEPCLEAN_ARMED:-0\}"$' lib/deep-clean.sh \
            || { echo "::error::lib/deep-clean.sh must DEFAULT ARCHFRICAN_DEEPCLEAN_ARMED to 0 (env-overridable; never hardcode =1)"; exit 1; }
          grep -qF 'DEEPCLEAN_DELETE_SUBVOLS=(@ @log @pkg @.snapshots)' lib/deep-clean.sh \
            || { echo "::error::lib/deep-clean.sh must define the FIXED subvolume delete allowlist verbatim (never computed)"; exit 1; }
          if grep -qE 'mkfs\.btrfs|cryptsetup luksFormat|wipefs|sgdisk' lib/deep-clean.sh; then
            echo "::error::lib/deep-clean.sh must NEVER reformat — found a full-disk-wipe verb (mkfs.btrfs/luksFormat/wipefs/sgdisk)"; exit 1
          fi
          echo "deepclean-safety: dry-run default OK, fixed allowlist OK, no full-disk-wipe verbs"

  migrations-idempotent:
    runs-on: ubuntu-latest        # the converge update path: migrations must be fresh-safe + idempotent
    steps:
      - uses: actions/checkout@v4
      - name: old install (no state-version) runs the full delta + idempotent; fresh marks-latest w/o running
        run: |
          set -uo pipefail
          export REPO_ROOT="$PWD"
          export ARCHFRICAN_STATE_DIR; ARCHFRICAN_STATE_DIR="$(mktemp -d)/state"
          # shellcheck disable=SC1091
          source lib/common.sh; source lib/migrate.sh
          set +e +o pipefail
          latest="$(_mig_latest)"; [ "$latest" -ge 1 ] || { echo "::error::no migrations found"; exit 1; }
          # OLD/pre-migrations install (no state-version) => treated as v0 => owes the full delta …
          [ "$(pending_migrations)" -eq "$latest" ] || { echo "::error::old install should owe the full delta"; exit 1; }
          run_migrations >/dev/null
          [ "$(cat "$ARCHFRICAN_STATE_DIR/state-version")" = "$latest" ] \
            || { echo "::error::delta did not reach latest"; exit 1; }
          # … and a SECOND run is a no-op
          run_migrations | grep -q 'up to date' || { echo "::error::second run not idempotent"; exit 1; }
          # FRESH install path: mig_mark_latest stamps current WITHOUT running anything
          rm -f "$ARCHFRICAN_STATE_DIR/state-version"; mig_mark_latest
          [ "$(cat "$ARCHFRICAN_STATE_DIR/state-version")" = "$latest" ] \
            || { echo "::error::mig_mark_latest did not stamp latest"; exit 1; }
          [ "$(pending_migrations)" -eq 0 ] || { echo "::error::fresh-stamped install should owe nothing"; exit 1; }
          echo "migrations: old-runs-delta + idempotent + fresh-marks-latest OK"

  prune-safety:
    runs-on: ubuntu-latest        # --prune must NEVER target a hand-installed or depended-upon package
    steps:
      - uses: actions/checkout@v4
      - name: prune candidates = managed ∩ installed − desired − has-dependents (and nothing else)
        run: |
          set -uo pipefail
          export REPO_ROOT="$PWD"
          export ARCHFRICAN_STATE_DIR; ARCHFRICAN_STATE_DIR="$(mktemp -d)"
          # shellcheck disable=SC1091
          source lib/common.sh; source lib/manifest.sh
          set +e +o pipefail
          printf '%s\n' base-pkg desired-pkg                       | sort -u > "$ARCHFRICAN_MANIFEST"
          printf '%s\n' base-pkg desired-pkg dropped-pkg dep-pkg   | sort -u > "$ARCHFRICAN_MANAGED"
          pacman() { case "$1 ${2:-}" in
            "-Qeq ")        printf '%s\n' base-pkg desired-pkg dropped-pkg user-pkg dep-pkg ;;
            "-Qi dep-pkg")  printf 'Required By : some-consumer\n' ;;
            "-Qi "*)        printf 'Required By : None\n' ;;
          esac; }
          export -f pacman
          got="$(prune_candidates | tr '\n' ' ')"
          # dropped-pkg: managed+undesired+no-deps -> candidate. user-pkg: not managed (hand-installed)
          # -> excluded. dep-pkg: has a dependent -> excluded. desired/base: wanted -> excluded.
          [ "$got" = "dropped-pkg " ] \
            || { echo "::error::prune unsafe: got [$got], expected 'dropped-pkg '"; exit 1; }
          echo "prune-safety: only managed+undesired+no-deps; hand-installed & depended pkgs excluded"

  cachyos-trust:
    runs-on: ubuntu-latest        # the CachyOS bootstrap runs as ROOT — its key must be pinned + lsigned
    steps:
      - uses: actions/checkout@v4
      - name: CachyOS key is pinned (40-hex fingerprint) and locally-signed into pacman's keyring
        run: |
          set -euo pipefail
          grep -qE 'CACHYOS_KEY_FPR="[0-9A-F]{40}"' modules/00-base.sh \
            || { echo "::error::modules/00-base.sh must pin a 40-hex CACHYOS_KEY_FPR (the stable trust anchor)"; exit 1; }
          grep -qE 'pacman-key --lsign-key "\$CACHYOS_KEY_FPR"' modules/00-base.sh \
            || { echo "::error::modules/00-base.sh must lsign the pinned CachyOS key (so its package installs are signature-verified)"; exit 1; }
          echo "cachyos-trust: CachyOS key pinned + lsigned (its packages are signature-verified)"

  theme-switch-smoke:
    runs-on: ubuntu-latest        # pure bash/sed — no Arch needed
    steps:
      - uses: actions/checkout@v4
      - name: apply every theme twice; assert idempotent + fully rendered
        run: |
          set -euo pipefail
          export HOME; HOME="$(mktemp -d)"
          export ARCHFRICAN_ROOT="$PWD"
          mkdir -p "$HOME/.config/niri"
          cp home/dot_config/niri/config.kdl.tmpl "$HOME/.config/niri/config.kdl"
          files=(ghostty/colors waybar/colors.css fuzzel/colors.ini swaync/colors.css niri/config.kdl \
                 gtk-3.0/gtk.css gtk-4.0/gtk.css fontconfig/fonts.conf qt6ct/qt6ct.conf qt5ct/qt5ct.conf \
                 archfrican/cohesion/vscode.colors.json walker/themes/archfrican/style.css)
          snap() { for f in "${files[@]}"; do cat "$HOME/.config/$f"; done | sha256sum; }
          for t in adl-dark adl-light archfrican-dark archfrican-light catppuccin-mocha tokyo-night high-contrast; do
            bin/theme-switch "$t" >/dev/null; a="$(snap)"
            bin/theme-switch "$t" >/dev/null; b="$(snap)"
            [ "$a" = "$b" ] || { echo "::error::theme-switch not idempotent for $t"; exit 1; }
            if grep -RnoE '\$\{[A-Z_]+\}' \
                 "$HOME/.config/ghostty/colors" "$HOME/.config/waybar/colors.css" \
                 "$HOME/.config/fuzzel/colors.ini" "$HOME/.config/swaync/colors.css" \
                 "$HOME/.config/gtk-3.0/gtk.css" "$HOME/.config/gtk-4.0/gtk.css" \
                 "$HOME/.config/fontconfig/fonts.conf" "$HOME/.icons/default/index.theme" \
                 "$HOME/.config/qt6ct/qt6ct.conf" "$HOME/.config/qt5ct/qt5ct.conf" \
                 "$HOME/.config/archfrican/cohesion/vscode.colors.json" \
                 "$HOME/.config/walker/themes/archfrican/style.css" \
                 "$HOME/.local/share/archfrican-webapps-ext/theme.css"; then
              echo "::error::unrendered \${VAR} token left by $t"; exit 1
            fi
            # homogeneity invariant: the theme's accent reaches GTK from the SAME source of truth
            acc="$( . "themes/$t/colors.sh" >/dev/null 2>&1; printf '%s' "$ACCENT" )"
            grep -qi "$acc" "$HOME/.config/gtk-3.0/gtk.css" \
              || { echo "::error::accent $acc did not reach gtk.css for $t"; exit 1; }
          done
          echo "theme-switch: all 9 themes render + idempotent; accent reaches GTK"
          # GRUB boot-menu theme.txt is a SYSTEM-path render (theme-switch writes it to /boot via sudo -n,
          # which CI can't do), so render it directly with the same token sed and assert it's fully resolved.
          for t in adl-dark adl-light archfrican-dark archfrican-light catppuccin-mocha tokyo-night high-contrast; do
            out="$( ( . "themes/$t/colors.sh"
                      sed -e "s|\${BG}|$BG|g" -e "s|\${BG_DIM}|$BG_DIM|g" -e "s|\${FG}|$FG|g" \
                          -e "s|\${FG_DIM}|$FG_DIM|g" -e "s|\${ACCENT}|$ACCENT|g" templates/grub.theme.txt ) )"
            printf '%s' "$out" | grep -qE '\$\{[A-Z_]+\}' && { echo "::error::grub.theme.txt: unrendered token for $t"; exit 1; } || true
            printf '%s' "$out" | grep -q 'selected_item_color = "#' || { echo "::error::grub.theme.txt: accent is not a hex colour for $t"; exit 1; }
          done
          echo "grub.theme.txt: all 9 themes render with no stray tokens"

  sddm-theme:
    runs-on: ubuntu-latest        # the graphical login theme: must render for every palette + be well-formed
    steps:
      - uses: actions/checkout@v4
      - name: SDDM theme well-formed (components + QML brace/paren balance) + renders for every palette
        run: |
          set -euo pipefail
          a=assets/sddm/archfrican
          for f in metadata.desktop Main.qml theme.conf; do
            [ -r "$a/$f" ] || { echo "::error::missing $a/$f"; exit 1; }
          done
          grep -q '^MainScript=Main.qml'  "$a/metadata.desktop" || { echo "::error::metadata.desktop: MainScript must be Main.qml"; exit 1; }
          grep -q '^ConfigFile=theme.conf' "$a/metadata.desktop" || { echo "::error::metadata.desktop: ConfigFile must be theme.conf"; exit 1; }
          # every component the theme imports must exist
          for c in Background AuroraBackground VideoBackground Clock LoginCard PowerMenu SessionPicker VirtualKeyboard; do
            [ -r "$a/Components/$c.qml" ] || { echo "::error::missing component Components/$c.qml"; exit 1; }
          done
          # QML structural smoke: balanced braces + parens per file (line-comments stripped). Not a full
          # parser (no Qt in CI) — it catches the truncations/typos that would crash the greeter at load.
          for q in "$a"/Main.qml "$a"/Components/*.qml; do
            code="$(sed 's#//.*##' "$q")"
            ob=$(printf '%s' "$code" | tr -cd '{' | wc -c); cb=$(printf '%s' "$code" | tr -cd '}' | wc -c)
            op=$(printf '%s' "$code" | tr -cd '(' | wc -c); cp=$(printf '%s' "$code" | tr -cd ')' | wc -c)
            [ "$ob" -eq "$cb" ] || { echo "::error::$q unbalanced braces ($ob { vs $cb })"; exit 1; }
            [ "$op" -eq "$cp" ] || { echo "::error::$q unbalanced parens ($op ( vs $cp ))"; exit 1; }
          done
          # fail-safe-core invariant: the ALWAYS-loaded path (Main + the directly-instantiated components)
          # must NOT import a possibly-missing module — those live ONLY behind Loaders. A leak here would let
          # an absent qt6-multimedia/qt6-virtualkeyboard/Effects crash the WHOLE greeter (no login).
          for q in Main.qml Components/Background.qml Components/Clock.qml Components/LoginCard.qml Components/PowerMenu.qml Components/SessionPicker.qml; do
            grep -qE '^[[:space:]]*import[[:space:]]+(QtQuick\.Effects|QtMultimedia|QtQuick\.VirtualKeyboard)' "$a/$q" \
              && { echo "::error::$q imports a Loader-only module into the always-loaded core (fail-safe-core invariant broken)"; exit 1; } || true
          done
          # the orchestrator must read the config palette + dispatch the background (so theme.conf drives it)
          grep -q 'config\.accentColor' "$a/Main.qml"       || { echo "::error::Main.qml must read config.accentColor"; exit 1; }
          grep -q 'config\.backgroundMode' "$a/Main.qml"    || { echo "::error::Main.qml must read config.backgroundMode"; exit 1; }
          # render the palette for every theme; assert no stray tokens + valid hex colours
          tmpl=templates/sddm.theme.conf
          for t in adl-dark adl-light archfrican-dark archfrican-light catppuccin-mocha tokyo-night high-contrast; do
            out="$( ( . "themes/$t/colors.sh"
                      sed -e "s|\${BG}|$BG|g" -e "s|\${BG_ALT}|$BG_ALT|g" -e "s|\${BG_DIM}|$BG_DIM|g" \
                          -e "s|\${FG}|$FG|g" -e "s|\${FG_DIM}|$FG_DIM|g" -e "s|\${ACCENT}|$ACCENT|g" \
                          -e "s|\${MAGENTA}|$MAGENTA|g" -e "s|\${CYAN}|$CYAN|g" "$tmpl" ) )"
            echo "$out" | grep -qE '\$\{[A-Z_]+\}' && { echo "::error::unrendered token in $t"; exit 1; }
            echo "$out" | grep -qE '^accentColor=#[0-9a-fA-F]{6}$' || { echo "::error::accentColor not a hex color in $t"; exit 1; }
            echo "$out" | grep -qE '^tint2=#[0-9a-fA-F]{6}$'       || { echo "::error::tint2 not a hex color in $t"; exit 1; }
          done
          echo "sddm-theme: 8 components present + QML balanced + 9 palettes render clean"

  pkg-resolution:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: every pacman-list package resolves in a binary repo
        run: |
          set -euo pipefail
          # gaming/packages.txt pulls 32-bit libs (steam, lib32-*) from [multilib]; the installer
          # enables it (modules/65-gaming.sh), so enable it here too or those packages won't resolve.
          grep -q '^\[multilib\]' /etc/pacman.conf || printf '\n[multilib]\nInclude = /etc/pacman.d/mirrorlist\n' >> /etc/pacman.conf
          pacman -Sy --noconfirm
          rc=0
          # Glob every pacman list (skip aur.txt, as the runtime preflight_pkgs does) so new
          # lists — security.txt, multiboot.txt — are covered automatically. gaming/packages.txt
          # lives outside packages/ (used by 65-gaming) so include it explicitly; flatpak/apps.txt
          # is NOT a pacman list (Flathub app-ids) and stays excluded.
          for f in packages/*.txt gaming/packages.txt; do
            [ -e "$f" ] || continue
            [ "$(basename "$f")" = aur.txt ] && continue
            # strip inline/whole-line comments, trim surrounding whitespace, drop blanks — else the
            # padding before aligned `# comments` rides along as a trailing-space pkg name (-> "target not found").
            mapfile -t pkgs < <(sed -E 's/#.*//; s/^[[:space:]]+//; s/[[:space:]]+$//' "$f" | grep .)
            echo "::group::$f"
            pacman -Sp --print-format '%n' "${pkgs[@]}" || rc=1
            echo "::endgroup::"
          done
          [ $rc -eq 0 ] || { echo "::error::a package in a pacman list does not resolve (AUR? typo?)"; exit 1; }

  grub-helper:
    runs-on: ubuntu-latest        # pure bash — lib/grub.sh must be idempotent + verify-or-die
    steps:
      - uses: actions/checkout@v4
      - name: grub helper is idempotent and dies on unparseable input
        run: |
          set -uo pipefail
          source lib/common.sh
          write_system_file() { cat > "$1"; }          # stub the privileged writer
          set +e
          fix="$(mktemp)"; GRUB_DEFAULT="$fix"; source lib/grub.sh; GRUB_DEFAULT="$fix"
          # idempotency: twice-run byte-identical, no false "changed", single token occurrence
          printf 'GRUB_CMDLINE_LINUX_DEFAULT="loglevel=3 quiet"\n' > "$fix"
          GRUB_CHANGED=0; append_grub_cmdline nvidia_drm.modeset=1; a="$(cat "$fix")"
          GRUB_CHANGED=0; append_grub_cmdline nvidia_drm.modeset=1; b="$(cat "$fix")"
          [ "$a" = "$b" ] || { echo "::error::append_grub_cmdline not idempotent"; exit 1; }
          [ "$GRUB_CHANGED" = 0 ] || { echo "::error::reported a change on the 2nd run"; exit 1; }
          [ "$(grep -c 'nvidia_drm.modeset=1' "$fix")" = 1 ] || { echo "::error::duplicate token"; exit 1; }
          set_grub_key GRUB_DISABLE_OS_PROBER false
          set_grub_key GRUB_DISABLE_OS_PROBER false
          [ "$(grep -c '^GRUB_DISABLE_OS_PROBER=false' "$fix")" = 1 ] || { echo "::error::set_grub_key duplicated"; exit 1; }
          # regression: a commented stock line above a live one must collapse to ONE canonical line
          # (GRUB honors the LAST assignment — a stale duplicate would silently win).
          printf '#GRUB_DISABLE_OS_PROBER=false\nGRUB_DISABLE_OS_PROBER=true\n' > "$fix"
          set_grub_key GRUB_DISABLE_OS_PROBER false
          { [ "$(grep -c GRUB_DISABLE_OS_PROBER "$fix")" = 1 ] && grep -qx 'GRUB_DISABLE_OS_PROBER=false' "$fix" && ! grep -q '=true' "$fix"; } \
            || { echo "::error::set_grub_key left a stale duplicate (GRUB honors the last line)"; exit 1; }
          # verify-or-die: single-quoted + absent CMDLINE must fail, not silently no-op
          printf "GRUB_CMDLINE_LINUX_DEFAULT='x'\n" > "$fix"
          ( append_grub_cmdline quiet ) 2>/dev/null && { echo "::error::did not die on single-quoted"; exit 1; } || true
          printf 'GRUB_TIMEOUT=5\n' > "$fix"
          ( append_grub_cmdline quiet ) 2>/dev/null && { echo "::error::did not die on absent CMDLINE"; exit 1; } || true
          echo "grub-helper: idempotent + verify-or-die OK"

  fido2-selfcheck:
    runs-on: ubuntu-latest        # pure bash — the no-lockout invariant + CVE-2025-23013 guard must hold
    steps:
      - uses: actions/checkout@v4
      - name: FIDO2 PAM selfcheck + version guard (fixture-based, no key needed)
        run: bash tests/unit/fido2.sh

  unit-logic:
    runs-on: ubuntu-latest        # pure bash, fixture/mock-based — no hardware, no disks, no root
    steps:
      - uses: actions/checkout@v4
      - name: GPU detection — vendor-id matching, VM path, 'CorporATIon' trap
        run: bash tests/unit/detect-gpu.sh
      - name: fw_allow — port/proto validation (no fail-open) + persist/dedup
        run: bash tests/unit/fw_allow.sh
      - name: multiboot — ESP OS classifier (Windows/Linux, skips our own loader)
        run: bash tests/unit/multiboot.sh
      - name: disk picker — live_disk no-abort + list_disks excludes USB
        run: bash tests/unit/disk.sh
      - name: displays — niri layout splice + validate-or-revert
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq && bash tests/unit/displays.sh
      - name: manifest — write_manifest fresh-state + prune_candidates locale robustness
        run: bash tests/unit/manifest.sh
      - name: deep-clean allowlist — fixed, never computed; @home guard; dry-run-by-default
        run: bash tests/unit/deep-clean.sh
      - name: converge — module_hash reacts to script/package/dir changes; drift_modules stamp logic
        run: bash tests/unit/converge.sh
      - name: defaults — is_installed()/list_category() cli+desktop-file detection (11 providers depend on this)
        run: bash tests/unit/defaults.sh

  modules-list-consistency:
    runs-on: ubuntu-latest        # 5 independent lists of module names must stay in sync, or drift silently
    steps:
      - uses: actions/checkout@v4
      - name: ARCHFRICAN_MODULES / module_label / module_desc / run_module dispatch / modules/*.sh all agree
        run: |
          set -euo pipefail
          modules_txt="$(grep -oE '^ARCHFRICAN_MODULES="[^"]*"' lib/converge.sh | sed -E 's/^ARCHFRICAN_MODULES="//; s/"$//' | tr ' ' '\n' | sort -u)"
          label_txt="$(awk '/^module_label\(\)/,/^}/' lib/phase2.sh | grep -oE '[0-9]{2}-[a-z]+(-[a-z]+)*\)' | tr -d ')' | sort -u)"
          desc_txt="$(awk '/^module_desc\(\)/,/^}/' lib/phase2.sh | grep -oE '[0-9]{2}-[a-z]+(-[a-z]+)*\)' | tr -d ')' | sort -u)"
          run_txt="$(grep -oE '^\s*run_module [0-9]{2}-[a-z-]+' lib/phase2.sh | awk '{print $2}' | sort -u)"
          files_txt="$(ls modules/*.sh | xargs -n1 basename | sed 's/\.sh$//' | sort -u)"

          [ "$modules_txt" = "$label_txt" ] \
            || { echo "::error::ARCHFRICAN_MODULES and module_label() disagree: $(diff <(echo "$modules_txt") <(echo "$label_txt") | tr '\n' ' ')"; exit 1; }
          [ "$modules_txt" = "$desc_txt" ] \
            || { echo "::error::ARCHFRICAN_MODULES and module_desc() disagree: $(diff <(echo "$modules_txt") <(echo "$desc_txt") | tr '\n' ' ')"; exit 1; }
          [ "$modules_txt" = "$run_txt" ] \
            || { echo "::error::ARCHFRICAN_MODULES and run_module() dispatch disagree: $(diff <(echo "$modules_txt") <(echo "$run_txt") | tr '\n' ' ')"; exit 1; }
          [ "$modules_txt" = "$files_txt" ] \
            || { echo "::error::ARCHFRICAN_MODULES and modules/*.sh on disk disagree: $(diff <(echo "$modules_txt") <(echo "$files_txt") | tr '\n' ' ')"; exit 1; }

          # module_inputs()'s case arms don't need to cover every module — one with no extra inputs
          # beyond its own script + lib/common.sh simply has no case arm (e.g. 50-snapshots installs
          # no dedicated package list) — but every arm that DOES exist must name a real module, catching
          # a stale/typo'd name if a module is ever renamed.
          inputs_txt="$(awk '/^module_inputs\(\)/,/^}/' lib/converge.sh | grep -oE '[0-9]{2}-[a-z]+(-[a-z]+)*\)' | tr -d ')' | sort -u)"
          bad="$(comm -23 <(echo "$inputs_txt") <(echo "$modules_txt"))"
          [ -z "$bad" ] || { echo "::error::module_inputs() case has an entry that is not a real module: $(echo "$bad" | tr '\n' ' ')"; exit 1; }

          echo "modules-list-consistency: ARCHFRICAN_MODULES/module_label/module_desc/run_module/modules-on-disk all agree; module_inputs() has no stale entries"

  keyd-config:
    runs-on: ubuntu-latest        # keyd is AUR (not in CI repos); validate the ⌘→Ctrl map STRUCTURALLY
    steps:
      - uses: actions/checkout@v4
      - name: keyd map uses the [meta] layer, never the rejected `meta.x =` shorthand
        run: |
          set -euo pipefail
          f=modules/20-niri-desktop.sh
          grep -qE '^\[meta\]' "$f" \
            || { echo "::error::keyd map must populate the [meta] modifier layer (⌘+letter → Ctrl)"; exit 1; }
          # keyd rejects `meta.c = …` as "not a valid key or alias" — it must be `c = C-c` under [meta].
          # Anchored at line start so the explanatory comment mentioning meta.x can't false-trip it.
          if grep -nE '^[[:space:]]*meta\.[a-z][[:space:]]*=' "$f"; then
            echo "::error::keyd rejects the 'meta.x = ...' shorthand — put the mapping under the [meta] section"; exit 1; fi
          # [meta+shift] composite layer is required: without it keyd's [meta] map ALSO captures
          # ⌘+Shift+<letter>, stealing niri's WM binds (⌘+Shift+A, etc.). Must come AFTER [meta].
          grep -qE '^\[meta\+shift\]' "$f" \
            || { echo "::error::keyd map must define [meta+shift] so ⌘+Shift+<letter> reaches niri (else it steals the WM binds)"; exit 1; }
          if [ "$(grep -n '^\[meta\]' "$f" | head -1 | cut -d: -f1)" -ge "$(grep -n '^\[meta+shift\]' "$f" | head -1 | cut -d: -f1)" ]; then
            echo "::error::[meta+shift] must be defined AFTER [meta] (keyd requires composite layers after their parts)"; exit 1; fi
          echo "keyd-config: [meta] + [meta+shift] present (ordered), no invalid meta.x shorthand"
