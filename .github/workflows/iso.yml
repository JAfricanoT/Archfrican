name: build-iso

# Triggers:
#   push to main      → build + upload artifact (validates the build doesn't break)
#   tag v* or iso-*   → build + publish as a versioned GitHub Release
#   schedule (weekly) → rebuild with fresh Arch packages → update "nightly" prerelease
#   workflow_dispatch → manual on-demand build

on:
  push:
    branches: [main]
    tags: ['v*', 'iso-*']
  schedule:
    - cron: '0 2 * * 0'    # Sunday 02:00 UTC — fresh packages weekly
  workflow_dispatch:

permissions:
  contents: write           # needed to create/update GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged  # mkarchiso needs loop devices for squashfs/ISO mounting

    steps:
      - uses: actions/checkout@v4

      - name: Refresh pacman db + install archiso
        run: |
          # Ensure the container has fresh package metadata and archiso available.
          # modprobe loop is best-effort: the module may already be loaded on the host.
          modprobe loop 2>/dev/null || true
          pacman -Sy --noconfirm --needed archiso rsync

      - name: Build ISO
        run: bash build-iso.sh

      - name: Compute ISO filename
        id: iso
        run: |
          f="$(ls out/archfrican-*.iso | head -1)"
          echo "path=$f"           >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$f")" >> "$GITHUB_OUTPUT"

      # Gate BEFORE upload/publish: the ISO used to go straight from "Compute ISO filename" (a bare
      # `ls`) to being uploaded and, on the weekly schedule, force-published over the "nightly"
      # release — with no check that the ISO is actually a bootable, complete archiso image. This
      # mounts it read-only and checks the standard releng layout (wiki.archlinux.org/title/Archiso):
      # arch/boot/x86_64/{vmlinuz-linux,initramfs-linux.img} for the kernel/initramfs, and
      # arch/x86_64/airootfs.sfs for the live root filesystem — plus an unsquashfs listing to confirm
      # the squashfs isn't truncated/corrupt and that our pre-bundled repo (build-iso.sh step 5)
      # actually made it in.
      - name: Validate ISO structure (kernel/initramfs present, squashfs listable, sane size)
        run: |
          set -euo pipefail
          iso="${{ steps.iso.outputs.path }}"
          pacman -Sy --noconfirm --needed squashfs-tools >/dev/null

          size=$(stat -c %s "$iso")
          min_size=$((300 * 1024 * 1024))   # 300 MiB — comfortably below any legitimate build, well
                                             # above what a truncated/broken build would produce
          [ "$size" -ge "$min_size" ] \
            || { echo "::error::ISO is suspiciously small ($size bytes) — expected at least $min_size bytes"; exit 1; }
          echo "ISO size: $size bytes (>= $min_size minimum)"

          mnt="$(mktemp -d)"
          mount -t iso9660 -o loop,ro "$iso" "$mnt"
          trap 'umount "$mnt" 2>/dev/null; rmdir "$mnt" 2>/dev/null' EXIT

          [ -f "$mnt/arch/boot/x86_64/vmlinuz-linux" ] \
            || { echo "::error::ISO is missing arch/boot/x86_64/vmlinuz-linux (kernel)"; exit 1; }
          [ -f "$mnt/arch/boot/x86_64/initramfs-linux.img" ] \
            || { echo "::error::ISO is missing arch/boot/x86_64/initramfs-linux.img"; exit 1; }
          sfs="$mnt/arch/x86_64/airootfs.sfs"
          [ -f "$sfs" ] \
            || { echo "::error::ISO is missing arch/x86_64/airootfs.sfs (the live root filesystem)"; exit 1; }
          echo "kernel + initramfs + airootfs.sfs present at the standard releng paths"

          unsquashfs -l "$sfs" > /tmp/sfs-listing.txt
          grep -q 'root/.archfrican/install.sh' /tmp/sfs-listing.txt \
            || { echo "::error::airootfs.sfs is missing root/.archfrican/install.sh — the pre-bundled repo did not make it into the ISO"; exit 1; }
          # The auto-launch hook must be root/.zlogin: the live root's shell is ZSH (releng
          # passwd), so a .bash_profile is dead code — exactly the bug that shipped once.
          grep -q 'root/.zlogin' /tmp/sfs-listing.txt \
            || { echo "::error::airootfs.sfs is missing root/.zlogin — the installer would never auto-start"; exit 1; }
          grep -q 'root/.bash_profile' /tmp/sfs-listing.txt \
            && { echo "::error::airootfs.sfs carries root/.bash_profile — a stale overlay? the live shell is zsh and never reads it"; exit 1; } || true
          # The bundled repo must be tracked content only — never the working tree's gitignored
          # secrets/state (answers.env holds test LUKS/user passwords).
          # Anchored so it flags ONLY the real leaks — the secret file itself (answers.env, NOT the
          # tracked answers.env.example template) and the dev-tooling DIRS (a slash on each side, not
          # a bare substring that also matches e.g. Anthropic.claude-code filenames).
          grep -qE '(/tests/e2e/answers\.env$|/\.archfrican/\.(claude|remember|superpowers)/)' /tmp/sfs-listing.txt \
            && { echo "::error::airootfs.sfs bundles gitignored working-tree files (answers.env/.claude/...) — build-iso.sh must bundle tracked content only"; exit 1; } || true
          echo "airootfs.sfs: readable via unsquashfs, contains the pre-bundled repo + the .zlogin auto-launch"

      # ---- artifact: always uploaded (available for ~14 days on any push) ----
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.iso.outputs.name }}
          path: ${{ steps.iso.outputs.path }}
          retention-days: 14
          compression-level: 0   # ISO is already compressed (zstd squashfs); don't double-compress

      # ---- versioned Release: only on explicit version tags ------------------
      - name: Publish versioned Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.iso.outputs.path }}
          generate_release_notes: true
          make_latest: true

      # ---- nightly prerelease: only on weekly schedule -----------------------
      # Overwrites the "nightly" tag each Sunday with the freshest packages.
      - name: Update nightly prerelease
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (latest Arch packages)"
          body: |
            Automated weekly rebuild with the latest Arch Linux packages.
            Not validated — use a tagged release for production installs.

            Built from `main` at ${{ github.sha }}.
          prerelease: true
          make_latest: false
          files: ${{ steps.iso.outputs.path }}

  # Boot the built ISO headless in QEMU and assert the installer AUTO-STARTS — the one thing the
  # structure check can't prove. The dead-`.bash_profile` bug shipped precisely because nothing ever
  # booted the image. Separate job (needs: build): it runs AFTER the build/upload/release, so a hiccup
  # in the boot test can never block an ISO release — it's a red flag, not a gate on shipping.
  # Method: DIRECT KERNEL BOOT (no OVMF/bootloader — GRUB is covered by the structure check), with a
  # serial console. The auto-launch hook (iso/airootfs/root/.zlogin) writes ARCHFRICAN_AUTOLAUNCH_OK to
  # /dev/kmsg, which reaches serial no matter which tty the getty took — so the assertion is console-
  # agnostic and doesn't depend on parsing the interactive installer.
  smoke-boot:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install QEMU + xorriso
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qemu-system-x86 xorriso

      - name: Download the built ISO
        uses: actions/download-artifact@v4
        with:
          path: iso-dl

      - name: Boot headless and assert the installer auto-starts
        run: |
          set -euo pipefail
          iso="$(find iso-dl -name 'archfrican-*.iso' | head -1)"
          [ -n "$iso" ] || { echo "::error::no built ISO artifact found"; exit 1; }
          echo "ISO: $iso"

          # Direct kernel boot bypasses the bootloader; pull the kernel + initramfs out of the ISO9660
          # filesystem with xorriso (the tool mkarchiso itself uses — reliable on the hybrid MBR/ISO
          # image, and needs no loop device, which GH runners can't set up).
          xorriso -osirrox on -indev "$iso" \
            -extract /arch/boot/x86_64/vmlinuz-linux     ./vmlinuz \
            -extract /arch/boot/x86_64/initramfs-linux.img ./initramfs 2>&1 | tail -4 || true
          { [ -s vmlinuz ] && [ -s initramfs ]; } || { echo "::error::could not extract kernel/initramfs from the ISO"; exit 1; }
          label="$(blkid -o value -s LABEL "$iso" 2>/dev/null || true)"
          [ -n "$label" ] || label="$(file "$iso" | grep -oP "'[^']+'" | head -1 | tr -d "'")"
          [ -n "$label" ] || label="$(xorriso -indev "$iso" -pvd_info 2>/dev/null | sed -n 's/.*Volume Id[[:space:]]*:[[:space:]]*//p' | head -1)"
          [ -n "$label" ] || { echo "::error::could not read the ISO volume label (archisolabel)"; exit 1; }
          echo "archiso label: $label"

          if [ -e /dev/kvm ]; then accel="-enable-kvm -cpu host"; echo "KVM: yes"; else accel="-cpu max"; echo "KVM: no (TCG — slower)"; fi

          # archiso finds its squashfs on the labelled CD; console=ttyS0 so /dev/kmsg reaches serial.
          # shellcheck disable=SC2086
          qemu-system-x86_64 $accel -m 2560 -smp 2 \
            -kernel vmlinuz -initrd initramfs \
            -append "archisobasedir=arch archisolabel=$label console=ttyS0,115200 cow_spacesize=1G" \
            -drive file="$iso",format=raw,media=cdrom,if=ide,readonly=on \
            -display none -serial file:serial.log -no-reboot &
          qpid=$!

          ok=0
          for _ in $(seq 1 300); do
            if grep -qa 'ARCHFRICAN_AUTOLAUNCH_OK' serial.log 2>/dev/null; then ok=1; break; fi
            kill -0 "$qpid" 2>/dev/null || break     # qemu exited early
            sleep 1
          done
          kill "$qpid" 2>/dev/null || true; wait "$qpid" 2>/dev/null || true

          if [ "$ok" = 1 ]; then
            echo "boot-smoke: installer auto-launch fired (ARCHFRICAN_AUTOLAUNCH_OK on serial) ✓"
          else
            echo "::error::boot-smoke: the installer never auto-started within the timeout — the live env"
            echo "::error::booted but .zlogin didn't run install.sh (the .bash_profile class), or it failed to boot."
            echo "----- last 120 serial lines -----"; tail -120 serial.log 2>/dev/null || echo "(no serial output)"
            exit 1
          fi

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-smoke-serial-log
          path: serial.log
          if-no-files-found: ignore
